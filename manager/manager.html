<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabKeeper</title>
  <link rel="icon" type="image/svg+xml" href="../icons/icon-48.svg" />
  <link rel="stylesheet" href="manager.css" />
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <button id="btn-sidebar-toggle" class="icon-btn sidebar-toggle-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="2" rx="1" fill="#fff"/><rect x="2" y="9" width="16" height="2" rx="1" fill="#fff"/><rect x="2" y="14" width="16" height="2" rx="1" fill="#fff"/></svg>
  </button>
  <div class="topbar-logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="6" fill="#1a73e8"/>
      <text x="16" y="23" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">S</text>
    </svg>
  </div>
  <div class="topbar-search">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#aaa" stroke-width="1.8"/><line x1="12.5" y1="12.5" x2="17" y2="17" stroke="#aaa" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input id="search-input" type="text" placeholder="Search tabs and collections" autocomplete="off" />
  </div>
  <div class="topbar-actions">
    <button id="btn-undo" class="icon-btn" title="Undo" disabled>
      <svg viewBox="0 0 24 24" fill="none"><path d="M20 7H9.00001C7.13077 7 6.19615 7 5.5 7.40193C5.04395 7.66523 4.66524 8.04394 4.40193 8.49999C4 9.19615 4 10.1308 4 12C4 13.8692 4 14.8038 4.40192 15.5C4.66523 15.9561 5.04394 16.3348 5.5 16.5981C6.19615 17 7.13077 17 9 17H16M20 7L17 4M20 7L17 10" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-redo" class="icon-btn" title="Redo" disabled>
      <svg viewBox="0 0 24 24" fill="none"><g transform="scale(-1,1) translate(-24,0)"><path d="M20 7H9.00001C7.13077 7 6.19615 7 5.5 7.40193C5.04395 7.66523 4.66524 8.04394 4.40193 8.49999C4 9.19615 4 10.1308 4 12C4 13.8692 4 14.8038 4.40192 15.5C4.66523 15.9561 5.04394 16.3348 5.5 16.5981C6.19615 17 7.13077 17 9 17H16M20 7L17 4M20 7L17 10" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></g></svg>
    </button>
    <button id="btn-settings" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.4 5.6C10.4 4.84575 10.4 4.46863 10.6343 4.23431C10.8686 4 11.2458 4 12 4C12.7542 4 13.1314 4 13.3657 4.23431C13.6 4.46863 13.6 4.84575 13.6 5.6V6.6319C13.9725 6.74275 14.3287 6.8913 14.6642 7.07314L15.3942 6.34315C15.9275 5.80982 16.1942 5.54315 16.5256 5.54315C16.8569 5.54315 17.1236 5.80982 17.6569 6.34315C18.1903 6.87649 18.4569 7.14315 18.4569 7.47452C18.4569 7.80589 18.1903 8.07256 17.6569 8.60589L16.9269 9.33591C17.1087 9.67142 17.2573 10.0276 17.3681 10.4H18.4C19.1542 10.4 19.5314 10.4 19.7657 10.6343C20 10.8686 20 11.2458 20 12C20 12.7542 20 13.1314 19.7657 13.3657C19.5314 13.6 19.1542 13.6 18.4 13.6H17.3681C17.2573 13.9724 17.1087 14.3286 16.9269 14.6641L17.6569 15.3941C18.1902 15.9275 18.4569 16.1941 18.4569 16.5255C18.4569 16.8569 18.1902 17.1235 17.6569 17.6569C17.1236 18.1902 16.8569 18.4569 16.5255 18.4569C16.1942 18.4569 15.9275 18.1902 15.3942 17.6569L14.6642 16.9269C14.3286 17.1087 13.9724 17.2573 13.6 17.3681V18.4C13.6 19.1542 13.6 19.5314 13.3657 19.7657C13.1314 20 12.7542 20 12 20C11.2458 20 10.8686 20 10.6343 19.7657C10.4 19.5314 10.4 19.1542 10.4 18.4V17.3681C10.0276 17.2573 9.67142 17.1087 9.33591 16.9269L8.60598 17.6569C8.07265 18.1902 7.80598 18.4569 7.47461 18.4569C7.14324 18.4569 6.87657 18.1902 6.34324 17.6569C5.80991 17.1235 5.54324 16.8569 5.54324 16.5255C5.54324 16.1941 5.80991 15.9275 6.34324 15.3941L7.07314 14.6642C6.8913 14.3287 6.74275 13.9725 6.6319 13.6H5.6C4.84575 13.6 4.46863 13.6 4.23431 13.3657C4 13.1314 4 12.7542 4 12C4 11.2458 4 10.8686 4.23431 10.6343C4.46863 10.4 4.84575 10.4 5.6 10.4H6.6319C6.74275 10.0276 6.8913 9.67135 7.07312 9.33581L6.3432 8.60589C5.80987 8.07256 5.5432 7.80589 5.5432 7.47452C5.5432 7.14315 5.80987 6.87648 6.3432 6.34315C6.87654 5.80982 7.1432 5.54315 7.47457 5.54315C7.80594 5.54315 8.07261 5.80982 8.60594 6.34315L9.33588 7.07308C9.6714 6.89128 10.0276 6.74274 10.4 6.6319V5.6Z" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14.4 12C14.4 13.3255 13.3255 14.4 12 14.4C10.6745 14.4 9.6 13.3255 9.6 12C9.6 10.6745 10.6745 9.6 12 9.6C13.3255 9.6 14.4 10.6745 14.4 12Z" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</header>

<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <section class="sidebar-section">
      <div class="sidebar-label">TABS</div>
      <div id="sidebar-history" class="sidebar-item" data-view="history">
        <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 7V12L14.5 10.5M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="sidebar-item-text">
          <div class="sidebar-item-title">History</div>
          <div class="sidebar-item-sub" id="history-sidebar-sub">— entries</div>
        </div>
      </div>
      <div id="sidebar-closed" class="sidebar-item" data-view="closed">
        <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 7V12L14.5 10.5M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="sidebar-item-text">
          <div class="sidebar-item-title">Recently closed</div>
          <div class="sidebar-item-sub" id="closed-sidebar-sub">— items</div>
        </div>
      </div>
      <div id="sidebar-current" class="sidebar-item active" data-view="current">
        <svg class="sidebar-item-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#e8a020" stroke-width="1.8"/><line x1="10" y1="2" x2="10" y2="18" stroke="#e8a020" stroke-width="1.4"/><path d="M2 10 Q6 6 10 10 Q14 14 18 10" stroke="#e8a020" stroke-width="1.4" fill="none"/></svg>
        <div class="sidebar-item-text">
          <div class="sidebar-item-title">This browser</div>
          <div class="sidebar-item-sub" id="current-tab-count">— tabs</div>
        </div>
      </div>
    </section>

    <section class="sidebar-section">
      <div class="sidebar-label">COOKIES</div>
      <div id="sidebar-cookies" class="sidebar-item" data-view="cookies">
        <svg class="sidebar-item-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="#9a6dd7" stroke-width="1.8"/>
          <circle cx="7"  cy="8"  r="1.2" fill="#9a6dd7"/>
          <circle cx="13" cy="8"  r="1.2" fill="#9a6dd7"/>
          <circle cx="10" cy="13" r="1.2" fill="#9a6dd7"/>
          <circle cx="7"  cy="13" r="0.8" fill="#9a6dd7"/>
          <circle cx="13" cy="13" r="0.8" fill="#9a6dd7"/>
        </svg>
        <div class="sidebar-item-text">
          <div class="sidebar-item-title">Private window</div>
          <div class="sidebar-item-sub" id="cookie-sidebar-sub">— cookies</div>
        </div>
      </div>
    </section>

    <section class="sidebar-section">
      <div class="sidebar-label">COLLECTIONS</div>
      <div id="sessions-list" class="sessions-nav">
        <!-- dynamically populated -->
      </div>
      <div id="no-collections" class="no-collections">
        <svg viewBox="0 0 40 40" fill="none"><rect x="6" y="8" width="28" height="24" rx="3" stroke="#555" stroke-width="1.5"/><line x1="13" y1="14" x2="27" y2="14" stroke="#555" stroke-width="1.5"/><line x1="13" y1="20" x2="22" y2="20" stroke="#555" stroke-width="1.5"/></svg>
        <div class="no-collections-title">No collections</div>
        <div class="no-collections-sub">Save tabs to create a collection</div>
      </div>
      <div id="sidebar-sel-bar" class="sidebar-sel-bar hidden">
        <span class="sidebar-sel-count" id="sidebar-sel-count"></span>
        <button class="sidebar-sel-del" id="sidebar-sel-del">Delete</button>
      </div>
    </section>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- Content header bar -->
    <div class="content-header">
      <div class="content-header-info">
        <div class="content-header-title" id="content-title">This browser</div>
        <div class="content-header-sub" id="content-sub"></div>
      </div>
      <div class="content-header-buttons" id="content-actions">
        <!-- Populated dynamically per view -->
      </div>
    </div>

    <!-- Windows / tabs area -->
    <div id="content-area" class="content-area">
      <!-- Populated dynamically -->
    </div>
  </main>

</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="modal-title">Save Session</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- SELECTION BAR (tab selection) -->
<div id="selection-bar" class="selection-bar hidden">
  <span class="sel-count" id="sel-count"></span>
  <button class="sel-btn sel-save" id="sel-save" style="display:none">Save selected</button>
  <button class="sel-btn sel-remove" id="sel-remove" style="display:none">Remove from session</button>
  <button class="sel-btn" id="sel-new-window" style="display:none">Extract to new window</button>
  <button class="sel-btn" id="sel-open" style="display:none">Open tabs</button>
  <button class="sel-btn" id="sel-copy">Copy URLs</button>
  <button class="sel-btn sel-clear" id="sel-clear">Clear</button>
</div>

<!-- NOTIFICATION TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- Hidden file inputs for import -->
<input type="file" id="import-json-input"    accept=".json,application/json" style="display:none" />
<input type="file" id="import-text-input"   accept=".txt,text/plain"        style="display:none" />
<input type="file" id="import-cookie-input"  accept=".json,application/json" style="display:none" />
<input type="file" id="import-backup-input" accept=".json,application/json" style="display:none" />

<script src="manager.js"></script>
<script src="drag-drop.js"></script>
</body>
</html>
